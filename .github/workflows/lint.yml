name: Code Quality

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run linter
        run: bun lint
      
      - name: Run type check
        run: bunx tsc -b
